<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Glory:ital,wght@0,100..800;1,100..800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link rel="stylesheet" href="./css/style.css" />
    <title>task-6</title>
  </head>
  <body>
    <header>
      <h1>Our Products</h1>
    </header>
    <section class="product-list">
      <div class="product-item">
        <div class="product-img">
          <img src="./img/iphone .png" alt="Product 1" />
        </div>
        <div class="product-info">
          <h2>iPhone 9</h2>
          <p>An apple mobile which is nothing like apple</p>
          <div class="product-pricing">
            <p class="discount">477.85$</p>
            <p class="main-price">549$</p>
          </div>
          <div class="product-actions">
            <button>Add to Cart</button>
            <button>View Details</button>
          </div>
        </div>
      </div>
    </section>
  </body>
</html>
